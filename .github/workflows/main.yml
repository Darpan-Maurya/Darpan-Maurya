name: Update profile assets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Regenerate README assets
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PROFILE_USER: Darpan-Maurya
          STATIC: "1"
        run: python scripts/update_assets.py

      - name: Commit generated changes
        run: |
          if git diff --quiet -- data/contributions.json contrib-heatmap.svg info-card.svg avi-ascii.svg; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg info-card.svg avi-ascii.svg
          git commit -m "chore: update profile assets"
          git push
